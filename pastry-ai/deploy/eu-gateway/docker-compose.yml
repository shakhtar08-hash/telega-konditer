services:
  pastry-ai-eu-gateway:
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        OPENAI_API_KEY: ${OPENAI_API_KEY}
        OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
        SUPABASE_URL: ${SUPABASE_URL}
        SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
        SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
        DATABASE_URL: ${DATABASE_URL}
        DIRECT_URL: ${DIRECT_URL}
        TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
        TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET}
        ADMIN_USERNAME: ${ADMIN_USERNAME}
        ADMIN_PASSWORD: ${ADMIN_PASSWORD}
        ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET}
        APP_BASE_URL: ${APP_BASE_URL}
        CLOUDPAYMENTS_PUBLIC_ID: ${CLOUDPAYMENTS_PUBLIC_ID}
        CLOUDPAYMENTS_API_SECRET: ${CLOUDPAYMENTS_API_SECRET}
        CRON_SECRET: ${CRON_SECRET}
        RENDER_CARD_SECRET: ${RENDER_CARD_SECRET}
        YOUTUBE_API_KEY: ${YOUTUBE_API_KEY}
        INTERNAL_API_BASE_URL: ${INTERNAL_API_BASE_URL}
        INTERNAL_API_SHARED_SECRET: ${INTERNAL_API_SHARED_SECRET}
        INTERNAL_TELEGRAM_INGRESS_URL: ${INTERNAL_TELEGRAM_INGRESS_URL}
        INTERNAL_AI_GATEWAY_URL: ${INTERNAL_AI_GATEWAY_URL}
        APP_REGION: ${APP_REGION}
        APP_ROLE: ${APP_ROLE}
    env_file:
      - .env
    environment:
      TZ: Europe/Moscow
    labels:
      traefik.enable: "true"
      traefik.docker.network: "coolify"
      traefik.http.middlewares.gzip.compress: "true"
      traefik.http.middlewares.redirect-to-https.redirectscheme.scheme: "https"
      traefik.http.routers.http-0-pastry-ai-eu-gateway.entryPoints: "http"
      traefik.http.routers.http-0-pastry-ai-eu-gateway.middlewares: "redirect-to-https"
      traefik.http.routers.http-0-pastry-ai-eu-gateway.rule: "Host(`${GATEWAY_PUBLIC_HOST}`) && PathPrefix(`/`)"
      traefik.http.routers.http-0-pastry-ai-eu-gateway.service: "http-0-pastry-ai-eu-gateway"
      traefik.http.routers.https-0-pastry-ai-eu-gateway.entryPoints: "https"
      traefik.http.routers.https-0-pastry-ai-eu-gateway.middlewares: "gzip"
      traefik.http.routers.https-0-pastry-ai-eu-gateway.rule: "Host(`${GATEWAY_PUBLIC_HOST}`) && PathPrefix(`/`)"
      traefik.http.routers.https-0-pastry-ai-eu-gateway.service: "https-0-pastry-ai-eu-gateway"
      traefik.http.routers.https-0-pastry-ai-eu-gateway.tls: "true"
      traefik.http.routers.https-0-pastry-ai-eu-gateway.tls.certresolver: "letsencrypt"
      traefik.http.services.http-0-pastry-ai-eu-gateway.loadbalancer.server.port: "3000"
      traefik.http.services.https-0-pastry-ai-eu-gateway.loadbalancer.server.port: "3000"
    ports:
      - "3001:3000"
    restart: unless-stopped
    networks:
      - default
      - coolify

networks:
  coolify:
    external: true
