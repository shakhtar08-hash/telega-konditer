services:
  pastry-ai-cron:
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        OPENAI_API_KEY: ${OPENAI_API_KEY}
        OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
        SUPABASE_URL: ${SUPABASE_URL}
        SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
        SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
        DATABASE_URL: ${DATABASE_URL}
        DIRECT_URL: ${DIRECT_URL}
        TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
        TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET}
        ADMIN_USERNAME: ${ADMIN_USERNAME}
        ADMIN_PASSWORD: ${ADMIN_PASSWORD}
        ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET}
        APP_BASE_URL: ${APP_BASE_URL}
        CLOUDPAYMENTS_PUBLIC_ID: ${CLOUDPAYMENTS_PUBLIC_ID}
        CLOUDPAYMENTS_API_SECRET: ${CLOUDPAYMENTS_API_SECRET}
        CRON_SECRET: ${CRON_SECRET}
        RENDER_CARD_SECRET: ${RENDER_CARD_SECRET}
        YOUTUBE_API_KEY: ${YOUTUBE_API_KEY}
        INTERNAL_API_BASE_URL: ${INTERNAL_API_BASE_URL}
        INTERNAL_API_SHARED_SECRET: ${INTERNAL_API_SHARED_SECRET}
        INTERNAL_TELEGRAM_INGRESS_URL: ${INTERNAL_TELEGRAM_INGRESS_URL}
        INTERNAL_AI_GATEWAY_URL: ${INTERNAL_AI_GATEWAY_URL}
        APP_REGION: ${APP_REGION}
        APP_ROLE: ${APP_ROLE}
    env_file:
      - .env
    ports:
      - "127.0.0.1:3002:3000"
    restart: unless-stopped
    volumes:
      - /srv/pastry-ai/uploads:/app/public/uploads
    networks:
      - ru_app

networks:
  ru_app:
    external: true
    name: ru_default
